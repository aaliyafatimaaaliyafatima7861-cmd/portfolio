name: 🚀 Portfolio CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # 1. Lint & Test
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install HTML validator
        run: npm install -g html-validator-cli
      
      - name: Validate HTML
        run: |
          html-validator-cli --exit-zero --format json *.html
      
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress "**/*.html"
      
      - name: Check Supabase config
        run: |
          if grep -q "supabase" index.html; then
            echo "✅ Supabase config found"
          else
            echo "❌ Supabase config missing"
            exit 1
          fi

  # 2. Build & Deploy
  deploy:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Setup Pages
        uses: actions/configure-pages@v4

      - name: 🧹 Clean & Optimize
        run: |
          # Minify HTML/CSS/JS (optional)
          echo "✅ Static files ready for deployment"

      - name: 📦 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Notify Success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: '${{ steps.deployment.outputs.page_url }}',
              description: 'Portfolio deployed successfully! 🌸',
              context: 'Deploy Status'
            })
