<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

/* ===== GLOBAL ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #f8e8ff 0%, #e8f4fd 30%, #ffeef8 70%, #f0e6ff 100%);
    color: #4a2c5e;
    scroll-behavior: smooth;
    position: relative;
    overflow-x: hidden;
}

/* 🌸 BEAUTIFUL FLORAL BACKGROUND */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d8bffd' fill-opacity='0.12'%3E%3Ccircle cx='30' cy='30' r='3'/%3E%3C/g%3E%3C/svg%3E"),
        url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffb3d9' fill-opacity='0.08'%3E%3Cpath d='m20 0c-5.555 0-10 4.445-10 10s4.445 10 10 10 10-4.445 10-10-4.445-10-10-10zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z'/%3E%3C/g%3E%3C/svg%3E");
    background-size: 60px 60px, 40px 40px;
    z-index: -2;
    animation: floatBG 20s ease-in-out infinite;
}

@keyframes floatBG {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
}

.container {
    width: 90%;
    max-width: 1100px;
    margin: auto;
    position: relative;
}

/* ===== NAVBAR ===== */
nav {
    position: fixed;
    width: 100%;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    padding: 15px 0;
    z-index: 1000;
    box-shadow: 0 8px 32px rgba(248, 232, 255, 0.3);
    border-bottom: 1px solid rgba(216, 191, 253, 0.4);
}

nav .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav h2 {
    background: linear-gradient(135deg, #c084fc, #ff80ab);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    font-size: 1.8rem;
}

nav ul {
    display: flex;
    gap: 25px;
    list-style: none;
}

nav a {
    color: #6b46c1;
    text-decoration: none;
    font-weight: 500;
    transition: .3s;
    position: relative;
}

nav a:hover {
    color: #ff80ab;
}

nav a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -5px;
    left: 0;
    background: linear-gradient(135deg, #c084fc, #ff80ab);
    transition: width .3s;
}

nav a:hover::after {
    width: 100%;
}

/* ===== HERO ===== */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, rgba(248, 232, 255, 0.95), rgba(232, 244, 253, 0.95), rgba(255, 238, 248, 0.95));
    position: relative;
}

.hero::before {
    content: '🌸✨';
    position: absolute;
    top: 20%;
    left: 10%;
    font-size: 4rem;
    animation: floatFlower 6s ease-in-out infinite;
    opacity: 0.6;
}

.hero::after {
    content: '🌺💫';
    position: absolute;
    bottom: 20%;
    right: 10%;
    font-size: 4rem;
    animation: floatFlower 8s ease-in-out infinite reverse;
    opacity: 0.6;
}

    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33% { transform: translateY(-20px) rotate(10deg); }
